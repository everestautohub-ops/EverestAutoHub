name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Build React frontend
        run: |
          cd everest-auto-hub/frontend
          npm install
          npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: Himalayanmonk@22
          port: 22
          script: |
            cd /home2/everestautohub/public_html/everestautohub
            git pull origin main
            cp -R everest-auto-hub/backend/* /home2/everestautohub/backend/
            cd /home2/everestautohub/backend && source ~/nodevenv/backend/22/bin/activate && npm install --production
            cp -R /home2/everestautohub/public_html/everestautohub/everest-auto-hub/frontend/dist/* /home2/everestautohub/public_html/